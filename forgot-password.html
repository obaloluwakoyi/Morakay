<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Morakay Pork</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body class="auth-page">
    <nav id="main-nav"></nav>

    <div class="split-screen">
        <div class="auth-visual"
            style="background-image: linear-gradient(rgba(26, 42, 58, 0.85), rgba(26, 42, 58, 0.85)), url('https://images.unsplash.com/photo-1593039668577-843f95368350?q=80&w=1200');">
            <div class="visual-content">
                <h1>Security <span>First</span></h1>
                <p>We take your account security seriously. Follow the steps to safely regain access to your Morakay
                    account.</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-box">
                <a href="index.html"><img src="images/logo.png" alt="Logo" class="auth-logo"></a>
                <h2>Reset Password</h2>
                <p class="auth-subtitle">Reset your password here. If a server is connected, it will sync there too.
                </p>

                <form id="forgot-form" action="signin.html" method="POST">
                    <div class="input-group">
                        <label for="fp-email">Email Address</label>
                        <input id="fp-email" name="email" type="email" placeholder="email@example.com" required
                            autocomplete="email" aria-label="Email address">
                    </div>
                    <div class="input-group">
                        <label for="fp-password">New Password</label>
                        <input id="fp-password" name="password" type="password" placeholder="Enter a new password"
                            required autocomplete="new-password" aria-label="New password">
                    </div>
                    <div class="input-group">
                        <label for="fp-confirm">Confirm New Password</label>
                        <input id="fp-confirm" name="confirmPassword" type="password"
                            placeholder="Confirm your new password" required autocomplete="new-password"
                            aria-label="Confirm new password">
                    </div>
                    <p id="auth-error" class="auth-message auth-message-error" style="display: none;"></p>
                    <p id="auth-success" class="auth-message auth-message-success" style="display: none;"></p>
                    <button type="submit" class="btn-primary auth-btn">Update Password</button>
                </form>

                <p class="auth-footer">Remember your password? <a href="signin.html">Back to Sign In</a></p>
            </div>
        </div>
    </div>

    <aside id="cart-drawer"></aside>
    <footer id="main-footer"></footer>
    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>

</html>
